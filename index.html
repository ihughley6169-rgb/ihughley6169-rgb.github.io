<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://jsdelivr.net">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRO MATH • Student Resource Hub</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* --- VIROS PROX NEON THEME --- */
        :root {
            --bg: #0b0a0f;
            --surface: #141020;
            --border: #3b2a55;
            --accent: #9f5eff;
            --accent-glow: rgba(159, 94, 255, 0.4);
            --text: #f2eaff;
            --text-muted: #bcb0da;
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            overflow-x: hidden;
            position: relative;
        }

        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        header {
            background: rgba(20, 16, 32, 0.8);
            backdrop-filter: blur(12px);
            padding: 1.2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(145deg, #d4c0ff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-container {
            display: flex;
            flex: 1;
            max-width: 600px;
            gap: 0.8rem;
        }

        #searchBar, #filterOptions {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        #searchBar { flex: 2; }
        #searchBar:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            position: relative;
            z-index: 2;
        }

        #zoneCount {
            display: inline-block;
            background: rgba(180, 122, 255, 0.15);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.75rem;
            color: #c4aaff;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        /* --- CATEGORY SECTIONS --- */
        .category-section { margin-bottom: 40px; animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .cat-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .cat-label {
            background: rgba(159, 94, 255, 0.1);
            border: 1px solid rgba(159, 94, 255, 0.2);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .cat-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

        /* --- GRID & CARDS --- */
        #container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .zone-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        .zone-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .icon-wrap {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(159,94,255,0.2);
        }

        .icon-wrap img { width: 30px; height: 30px; border-radius: 4px; }
        
        .zone-info { flex: 1; min-width: 0; }
        .zone-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .zone-domain { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }

        .hidden { display: none !important; }

        #settingsBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
    <div class="header-content">
        <div class="logo"><i class="fas fa-bolt"></i> VIRO MATH</div>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search games & tools...">
            <select id="filterOptions">
                <option value="All">All Categories</option>
            </select>
        </div>
    </div>
</header>

<main>
    <div id="zoneCount"><i class="fas fa-sync fa-spin"></i> Syncing with VIRO Database...</div>
    <div id="container"></div>
</main>

<button id="settingsBtn"><i class="fas fa-sliders-h"></i></button>

<script>
    // Configuration
    const SOURCE_URL = 'https://githubusercontent.com';
    const CORS_PROXY = 'https://allorigins.win';
    
    let gameData = [];
    let currentCategory = 'All';

    // --- Particle Logic ---
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = Array.from({length: 60}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            sx: (Math.random() - 0.5) * 0.5,
            sy: (Math.random() - 0.5) * 0.5
        }));
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(159, 94, 255, 0.3)';
        particles.forEach(p => {
            p.x += p.sx; p.y += p.sy;
            if(p.x < 0 || p.x > canvas.width) p.sx *= -1;
            if(p.y < 0 || p.y > canvas.height) p.sy *= -1;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    // --- Data Fetching & Parsing ---
    async function loadData() {
        try {
            const response = await fetch(`${CORS_PROXY}${encodeURIComponent(SOURCE_URL)}`);
            const json = await response.json();
            const doc = new DOMParser().parseFromString(json.contents, 'text/html');
            
            const headers = doc.querySelectorAll('h3');
            headers.forEach(h => {
                const category = h.innerText.trim();
                const list = h.nextElementSibling;
                if(list && list.tagName === 'UL') {
                    const links = Array.from(list.querySelectorAll('a')).map(a => {
                        const url = a.href.replace(window.location.origin, 'https://github.io');
                        return {
                            name: a.innerText.trim(),
                            url: url,
                            domain: new URL(url).hostname
                        };
                    });
                    if(links.length) {
                        gameData.push({ category, links });
                        const opt = document.createElement('option');
                        opt.value = category; opt.innerText = category;
                        document.getElementById('filterOptions').appendChild(opt);
                    }
                }
            });
            render();
        } catch (e) {
            document.getElementById('zoneCount').innerText = "Database Offline";
        }
    }

    function render() {
        const container = document.getElementById('container');
        const search = document.getElementById('searchBar').value.toLowerCase();
        container.innerHTML = '';
        let total = 0;

        gameData.forEach(cat => {
            if (currentCategory !== 'All' && currentCategory !== cat.category) return;
            
            const filtered = cat.links.filter(l => l.name.toLowerCase().includes(search));
            if (!filtered.length) return;
            total += filtered.length;

            const section = document.createElement('div');
            section.className = 'category-section';
            section.style.gridColumn = "1 / -1";
            section.innerHTML = `
                <div class="cat-header">
                    <div class="cat-label">${cat.category}</div>
                    <div class="cat-line"></div>
                </div>
                <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem;"></div>
            `;
            
            const grid = section.querySelector('div:last-child');
            filtered.forEach(link => {
                const card = document.createElement('a');
                card.className = 'zone-item';
                card.href = link.url;
                card.target = '_blank';
                card.innerHTML = `
                    <div class="icon-wrap">
                        <img src="https://google.com{link.domain}" onerror="this.src='favicon.png'">
                    </div>
                    <div class="zone-info">
                        <div class="zone-name">${link.name}</div>
                        <div class="zone-domain">${link.domain}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(section);
        });

        document.getElementById('zoneCount').innerHTML = `<i class="fas fa-database"></i> ${total} MATH MODULES SYNCED`;
    }

    // --- Listeners ---
    document.getElementById('searchBar').oninput = render;
    document.getElementById('filterOptions').onchange = (e) => {
        currentCategory = e.target.value;
        render();
    };

    window.onresize = initParticles;
    initParticles();
    animate();
    loadData();
</script>

</body>
</html>
